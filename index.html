<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Clock</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="rain-container"></div>
    <div id="particles-container"></div>

    <div id="top">
      <form id="search-form">
        <div id="search-wrap">
          <input type="text" id="search-input" placeholder="City" autocomplete="off">
          <div id="suggestions" class="hidden"></div>
        </div>
        <button type="submit">&#10148;</button>
      </form>
      <button type="button" id="loc-btn" title="Your location">&#9737;</button>
      <div id="city-name"></div>
      <div id="coords"></div>
    </div>

    <div id="date-bar" class="hidden">
      <button type="button" id="date-back" class="date-btn">&larr;</button>
      <button type="button" id="date-display">
        <span id="date-label">Today</span>
        <input type="date" id="date-picker">
      </button>
      <button type="button" id="date-forward" class="date-btn">&rarr;</button>
      <button type="button" id="date-today" class="date-btn" title="Back to today">Now</button>
    </div>

    <div id="clock-area" class="hidden">
      <svg id="clock-svg" viewBox="0 0 400 400">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
        <g id="hour-markers"></g>
        <g id="temp-ring"></g>
        <g id="hour-dots"></g>
        <line id="clock-hand" x1="200" y1="200" x2="200" y2="60" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
        <circle cx="200" cy="200" r="4" fill="white" filter="url(#glow)"/>
      </svg>

      <div id="clock-center">
        <div id="clock-day"></div>
        <div id="clock-date"></div>
        <div id="clock-icon"></div>
        <div id="clock-temp"></div>
        <div id="clock-desc"></div>
      </div>
    </div>

    <div id="daily-fact" class="hidden">
      <span class="fact-label">Did you know?</span>
      <span class="fact-text" id="fact-text"></span>
    </div>

    <div id="stats-row" class="hidden">
      <div class="stat" id="stat-rain">
        <div class="stat-visual" id="rain-visual"></div>
        <div class="stat-text">
          <div class="stat-label">Chance of rain</div>
          <div class="stat-value" id="rain-value">--</div>
        </div>
      </div>
      <div class="stat" id="stat-wind">
        <div class="stat-visual" id="wind-visual"></div>
        <div class="stat-text">
          <div class="stat-label">Wind</div>
          <div class="stat-value" id="wind-value">--</div>
        </div>
      </div>
      <div class="stat" id="stat-humidity">
        <div class="stat-visual" id="humidity-visual"></div>
        <div class="stat-text">
          <div class="stat-label">Humidity</div>
          <div class="stat-value" id="humidity-value">--</div>
        </div>
      </div>
    </div>

    <div id="outfit-section" class="hidden">
      <div class="section-label">Wear today</div>
      <div id="outfit-items"></div>
    </div>

    <div id="activities-section" class="hidden">
      <div class="section-label">Good for</div>
      <div id="activity-badges"></div>
    </div>

    <div id="hour-popup" class="hidden">
      <div id="popup-content">
        <div id="popup-time"></div>
        <div id="popup-icon"></div>
        <div id="popup-temp"></div>
        <div id="popup-desc"></div>
        <div id="popup-details"></div>
      </div>
    </div>

    <div id="sun-arc" class="hidden">
      <svg id="sun-svg" viewBox="0 0 300 100">
        <defs>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="M 20 90 Q 150 -20 280 90" fill="none" stroke="rgba(255,200,50,0.2)" stroke-width="2" stroke-dasharray="4 4"/>
        <circle id="sun-dot" cx="20" cy="90" r="8" fill="#fbbf24" filter="url(#glow2)"/>
        <text x="20" y="108" fill="rgba(255,255,255,0.5)" font-size="10" id="sunrise-label">Sunrise</text>
        <text x="250" y="108" fill="rgba(255,255,255,0.5)" font-size="10" id="sunset-label">Sunset</text>
      </svg>
    </div>

    <div id="loading-screen" class="hidden">
      <div class="orb"></div>
    </div>

    <div id="error-screen" class="hidden">
      <p id="error-msg"></p>
      <button id="retry-btn">Try again</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
